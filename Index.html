<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>計算機</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #ffffff; font-family: -apple-system, sans-serif; padding: 16px; }
        .calculator { background-color: #1c1c1e; width: 100%; max-width: 390px; border-radius: 28px; padding: 20px; }
        .screen { padding: 10px 8px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; min-height: 120px; border-bottom: 1px solid #2c2c2e; }
        .mode-indicator { font-size: 0.75rem; color: #aeaeb2; font-weight: 600; margin-bottom: auto; align-self: flex-start; }
        .history-panel { font-size: 0.95rem; color: #8e8e93; width: 100%; text-align: right; overflow-x: auto; white-space: nowrap; margin-bottom: 4px; font-family: monospace; }
        .display { font-size: 2.6rem; color: #ffffff; width: 100%; text-align: right; overflow-x: auto; white-space: nowrap; font-family: monospace; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        button { border: none; border-radius: 50%; aspect-ratio: 1; font-size: 1.15rem; background-color: #2c2c2e; color: #ffffff; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        button:active { background-color: #48484a; }
        .btn-sci { background-color: #242426; color: #d1d1d6; font-size: 0.95rem; }
        .btn-sci:active { background-color: #3a3a3c; }
        .btn-op { background-color: #3a506b; color: #e1e8f0; font-size: 1.3rem; }
        .btn-op:active { background-color: #5c718e; }
        .btn-clear { background-color: #541e1e; color: #ff8585; }
        .btn-clear:active { background-color: #722f2f; }
        .btn-equal { background-color: #ffffff; color: #000000; grid-column: span 2; border-radius: 30px; aspect-ratio: auto; font-weight: 600; }
        .btn-equal:active { background-color: #d1d1d6; }
        .btn-zero { grid-column: span 2; border-radius: 30px; aspect-ratio: auto; }
    </style>
</head>
<body>
<div class="calculator">
    <div class="screen"><div class="mode-indicator" id="mode">DEG</div><div class="history-panel" id="historyPanel"></div><div class="display" id="display">0</div></div>
    <div class="grid">
        <button class="btn-sci" onclick="changeMode()">rad</button><button class="btn-sci" onclick="input('sin(')">sin</button><button class="btn-sci" onclick="input('cos(')">cos</button><button class="btn-sci" onclick="input('tan(')">tan</button><button class="btn-clear" onclick="clearScreen()">AC</button>
        <button class="btn-sci" onclick="input('π')">π</button><button class="btn-sci" onclick="input('log(')">log</button><button class="btn-sci" onclick="input('ln(')">ln</button><button class="btn-sci" onclick="input('^')">xʸ</button><button class="btn-clear" onclick="backspace()">DEL</button>
        <button class="btn-sci" onclick="input('e')">e</button><button class="btn-sci" onclick="input('√(')">√</button><button class="btn-sci" onclick="input('!')">n!</button><button class="btn-sci" onclick="input('*10^')">10ˣ</button><button class="btn-sci" onclick="input('(')">(</button>
        <button onclick="input('7')">7</button><button onclick="input('8')">8</button><button onclick="input('9')">9</button><button class="btn-op" onclick="input('÷')">÷</button><button class="btn-sci" onclick="input(')')">)</button>
        <button onclick="input('4')">4</button><button onclick="input('5')">5</button><button onclick="input('6')">6</button><button class="btn-op" onclick="input('×')">×</button><button class="btn-op" onclick="input('%')">%</button>
        <button onclick="input('1')">1</button><button onclick="input('2')">2</button><button onclick="input('3')">3</button><button class="btn-op" onclick="input('-')">-</button><button class="btn-equal" onclick="calculate()">=</button>
        <button class="btn-zero" onclick="input('0')">0</button><button onclick="input('.')">.</button><button class="btn-op" onclick="input('+')">+</button>
    </div>
</div>
<script>
    let currentInput = ''; let isDegree = true;
    const displayEl = document.getElementById('display'); const historyPanel = document.getElementById('historyPanel'); const modeEl = document.getElementById('mode');
    function input(value) { if (currentInput === '0' && !isNaN(value) && value !== '.') { currentInput = value; } else { if (currentInput === '0' && ['sin(','cos(','tan(','√(','log(','ln('].includes(value)) { currentInput = value; } else { currentInput += value; } } updateScreen(); }
    function clearScreen() { currentInput = '0'; historyPanel.innerText = ''; updateScreen(); }
    function backspace() { if (currentInput.length > 1) { currentInput = currentInput.slice(0, -1); } else { currentInput = '0'; } updateScreen(); }
    function changeMode() { isDegree = !isDegree; modeEl.innerText = isDegree ? 'DEG' : 'RAD'; }
    function updateScreen() { displayEl.innerText = currentInput; displayEl.scrollLeft = displayEl.scrollWidth; }
    function factorial(n) { if (n < 0 || !Number.isInteger(n)) return NaN; if (n === 0 || n === 1) return 1; let result = 1; for (let i = 2; i <= n; i++) result *= i; return result; }
    function calculate() { let originalExpression = currentInput; let expression = currentInput; try { expression = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E').replace(/√\(/g, 'Math.sqrt(').replace(/\*10\^(\d+)/g, '* Math.pow(10, $1)'); while(expression.includes('^')) { expression = expression.replace(/(\d+(\.\d+)?)\^(\d+(\.\d+)?)/g, 'Math.pow($1,$3)'); } const angleModifier = isDegree ? '* (Math.PI / 180)' : ''; expression = expression.replace(/sin\(([^)]+)\)/g, `Math.sin(($1) ${angleModifier})`).replace(/cos\(([^)]+)\)/g, `Math.cos(($1) ${angleModifier})`).replace(/tan\(([^)]+)\)/g, `Math.tan(($1) ${angleModifier})`).replace(/log\(([^)]+)\)/g, 'Math.log10($1)').replace(/ln\(([^)]+)\)/g, 'Math.log($1)').replace(/(\d+)!/g, (match, num) => factorial(parseInt(num))); let result = eval(expression); if (!isNaN(result)) { result = parseFloat(result.toFixed(10)); historyPanel.innerText = `${originalExpression} =`; currentInput = result.toString(); } else { currentInput = 'Error'; } } catch (error) { currentInput = 'Error'; } updateScreen(); }
</script>
</body>
</html>
