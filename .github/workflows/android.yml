name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create build-android com.billy.calculator Calculator
          cd build-android
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/

      - name: Build APK
        run: |
          cd build-android
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Calculator-APK
          path: build-android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
